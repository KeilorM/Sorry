<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lo siento</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(135deg, #fdf6f0 0%, #f3e7e9 50%, #e3eeff 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    padding: 20px;
    position: relative;
    transition: background 1.5s ease;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body.night {
    background: linear-gradient(135deg, #1b1530 0%, #2a1f4d 50%, #15102b 100%);
    background-size: 400% 400%;
  }

  body.night .card {
    background: rgba(30, 22, 50, 0.78);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 40px rgba(160, 130, 255, 0.15);
  }

  body.night h1 { color: #f0e6ff; }
  body.night p { color: #cfc3e8; }
  body.night .signature { color: #a797cf; }
  body.night .day-badge { background: rgba(255,255,255,0.1); color: #e0d0ff; }

  body.night .pixel-heart {
    opacity: 0.85;
    mix-blend-mode: normal;
    filter: drop-shadow(0 0 4px currentColor);
  }

  body.night .envelope-body { background: linear-gradient(160deg, #4a3970, #322455); }
  body.night .envelope-hint { color: #cfc3e8; }

  body.night .reply-box h2 { color: #f0e6ff; }
  body.night .reply-box textarea {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.2);
    color: #f0e6ff;
  }
  body.night .reply-box textarea::placeholder { color: #a797cf; }
  body.night .reply-box { border-top-color: rgba(255,255,255,0.12); }
  body.night .reply-thanks { color: #cfc3e8; }

  /* ---------- Corazones ---------- */
  .flower-field {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 5;
  }

  .pixel-heart {
    position: absolute;
    bottom: -40px;
    image-rendering: pixelated;
    animation-name: floatUp;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    opacity: 0.65;
    mix-blend-mode: multiply;
  }

  .pixel-heart::before {
    content: "";
    display: block;
    width: 4px;
    height: 4px;
    background: transparent;
    box-shadow:
      4px 0px 0 0 var(--c),  8px 0px 0 0 var(--c),
      16px 0px 0 0 var(--c), 20px 0px 0 0 var(--c),
      0px 4px 0 0 var(--c),  4px 4px 0 0 var(--c),  8px 4px 0 0 var(--c), 12px 4px 0 0 var(--c), 16px 4px 0 0 var(--c), 20px 4px 0 0 var(--c), 24px 4px 0 0 var(--c),
      0px 8px 0 0 var(--c),  4px 8px 0 0 var(--c),  8px 8px 0 0 var(--c), 12px 8px 0 0 var(--c), 16px 8px 0 0 var(--c), 20px 8px 0 0 var(--c), 24px 8px 0 0 var(--c),
      4px 12px 0 0 var(--c), 8px 12px 0 0 var(--c), 12px 12px 0 0 var(--c), 16px 12px 0 0 var(--c), 20px 12px 0 0 var(--c),
      8px 16px 0 0 var(--c), 12px 16px 0 0 var(--c), 16px 16px 0 0 var(--c),
      12px 20px 0 0 var(--c);
  }

  .pixel-heart.s1 { --c: #ff4d6d; transform: scale(0.8); }
  .pixel-heart.s2 { --c: #ffb6d9; transform: scale(1); }
  .pixel-heart.s3 { --c: #c9a7ff; transform: scale(0.7); }
  .pixel-heart.s4 { --c: #ffd166; transform: scale(0.9); }
  .pixel-heart.s5 { --c: #6fc3ff; transform: scale(1.1); }
  .pixel-heart.s6 { --c: #ff8fa3; transform: scale(0.65); }

  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    8% { opacity: 0.65; }
    50% { transform: translateY(-50vh) translateX(20px) rotate(15deg); }
    92% { opacity: 0.65; }
    100% { transform: translateY(-105vh) translateX(-10px) rotate(-15deg); opacity: 0; }
  }

  /* ---------- Badge día ---------- */
  .day-badge {
    display: inline-block;
    background: rgba(255, 111, 145, 0.12);
    color: #c0506a;
    border-radius: 999px;
    padding: 4px 16px;
    font-size: 0.82rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-style: normal;
    font-family: 'Georgia', serif;
    transition: background 1.5s ease, color 1.5s ease;
  }

  /* ---------- Sobre ---------- */
  .envelope-screen {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .envelope {
    position: relative;
    width: 260px;
    height: 170px;
    animation: envFloat 3s ease-in-out infinite;
  }

  @keyframes envFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #fff5f7, #ffe3ea);
    border-radius: 10px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    overflow: hidden;
  }

  .envelope-body::before, .envelope-body::after {
    content: "";
    position: absolute;
    top: 0;
    width: 0;
    height: 0;
    border-top: 85px solid #ffd3dd;
  }
  .envelope-body::before { left: 0; border-left: 130px solid transparent; }
  .envelope-body::after  { right: 0; border-right: 130px solid transparent; }

  .envelope-flap {
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 0;
    border-left: 130px solid transparent;
    border-right: 130px solid transparent;
    border-top: 95px solid #ffb6c8;
    transform-origin: top center;
    transition: transform 0.7s cubic-bezier(.6,-0.28,.74,.05);
    z-index: 3;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
  }

  .seal {
    position: absolute;
    top: 65px; left: 50%;
    transform: translate(-50%, 0);
    width: 36px; height: 36px;
    z-index: 4;
    image-rendering: pixelated;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .seal::before {
    content: "";
    display: block;
    width: 4px; height: 4px;
    background: transparent;
    transform: scale(1.4);
    box-shadow:
      4px 0px 0 0 #ff4d6d,  8px 0px 0 0 #ff4d6d,
      16px 0px 0 0 #ff4d6d, 20px 0px 0 0 #ff4d6d,
      0px 4px 0 0 #ff4d6d,  4px 4px 0 0 #ff4d6d,  8px 4px 0 0 #ff4d6d, 12px 4px 0 0 #ff4d6d, 16px 4px 0 0 #ff4d6d, 20px 4px 0 0 #ff4d6d, 24px 4px 0 0 #ff4d6d,
      0px 8px 0 0 #ff4d6d,  4px 8px 0 0 #ff4d6d,  8px 8px 0 0 #ff4d6d, 12px 8px 0 0 #ff4d6d, 16px 8px 0 0 #ff4d6d, 20px 8px 0 0 #ff4d6d, 24px 8px 0 0 #ff4d6d,
      4px 12px 0 0 #ff4d6d, 8px 12px 0 0 #ff4d6d, 12px 12px 0 0 #ff4d6d, 16px 12px 0 0 #ff4d6d, 20px 12px 0 0 #ff4d6d,
      8px 16px 0 0 #ff4d6d, 12px 16px 0 0 #ff4d6d, 16px 16px 0 0 #ff4d6d,
      12px 20px 0 0 #ff4d6d;
  }

  .envelope-hint {
    margin-top: 22px;
    font-size: 0.95rem;
    color: #8a6f6f;
    font-style: italic;
    animation: hintPulse 1.8s ease-in-out infinite;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .envelope-screen.opening .envelope-flap { transform: rotateX(180deg); }
  .envelope-screen.opening .seal { opacity: 0; transform: translate(-50%, -10px) scale(0.6); }
  .envelope-screen.opening .envelope { animation: none; }
  .envelope-screen.opening .envelope-body { animation: envShrink 0.6s ease 0.5s forwards; }
  .envelope-screen.opening .envelope-hint { opacity: 0; }

  @keyframes envShrink {
    to { transform: translateY(40px) scale(0.85); opacity: 0; }
  }

  .envelope-screen.hidden { display: none; }

  /* ---------- Carta ---------- */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    max-width: 520px;
    width: 100%;
    padding: 48px 40px;
    text-align: center;
    transition: background 1.5s ease, box-shadow 1.5s ease;
    display: none;
    opacity: 0;
  }

  .card.reveal {
    display: block;
    animation: letterRise 0.9s cubic-bezier(.2,.8,.2,1) forwards;
  }

  @keyframes letterRise {
    from { opacity: 0; transform: translateY(60px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .heart {
    font-size: 2.5rem;
    margin-bottom: 10px;
    animation: pulse 2s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  h1 {
    font-size: 1.9rem;
    color: #4a3b3b;
    margin: 0 0 18px;
    font-weight: 400;
    letter-spacing: 0.5px;
    transition: color 1.5s ease;
  }

  p {
    color: #6b5a5a;
    line-height: 1.7;
    font-size: 1.05rem;
    margin: 0 0 16px;
    transition: color 1.5s ease;
  }

  .signature {
    margin-top: 16px;
    font-style: italic;
    color: #9a8a8a;
    font-size: 0.95rem;
    transition: color 1.5s ease;
  }

  .spotify-wrapper {
    margin-top: 32px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    width: 100%;
  }

  .spotify-wrapper iframe {
    display: block;
    width: 100%;
    border-radius: 12px;
  }

  /* ---------- Casilla de respuesta ---------- */
  .reply-box {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid rgba(0,0,0,0.08);
    text-align: left;
  }

  .reply-box h2 {
    font-size: 1.1rem;
    font-weight: 400;
    color: #4a3b3b;
    margin: 0 0 14px;
    text-align: center;
    font-style: italic;
  }

  .reply-box textarea {
    width: 100%;
    min-height: 100px;
    border-radius: 12px;
    border: 1.5px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.6);
    padding: 12px 14px;
    font-family: inherit;
    font-size: 0.95rem;
    color: #4a3b3b;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s ease;
  }

  .reply-box textarea:focus { border-color: #ff8fa3; }

  .reply-box button {
    display: block;
    margin: 14px auto 0;
    padding: 10px 28px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff8fa3, #ff6f91);
    color: white;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(255,111,145,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .reply-box button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,111,145,0.45); }
  .reply-box button:disabled { opacity: 0.6; cursor: default; transform: none; }

  .reply-thanks {
    text-align: center;
    font-style: italic;
    color: #8a6f6f;
    margin-top: 14px;
  }

  /* ---------- Sin canción hoy ---------- */
  .no-song {
    color: #9a8a8a;
    font-style: italic;
    margin-top: 24px;
    font-size: 0.95rem;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 600px) {
    .card { padding: 36px 26px; border-radius: 20px; }
    h1 { font-size: 1.6rem; }
    p { font-size: 0.98rem; line-height: 1.6; }
    .heart { font-size: 2.1rem; }
    .spotify-wrapper iframe { height: 232px; }
    .envelope { width: 220px; height: 145px; }
    .envelope-body::before, .envelope-body::after { border-top: 72px solid #ffd3dd; }
    .envelope-body::before { border-left: 110px solid transparent; }
    .envelope-body::after  { border-right: 110px solid transparent; }
    .envelope-flap { border-left: 110px solid transparent; border-right: 110px solid transparent; border-top: 80px solid #ffb6c8; }
  }

  @media (max-width: 380px) {
    body { padding: 12px; }
    .card { padding: 28px 18px; border-radius: 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; }
    p { font-size: 0.92rem; }
    .spotify-wrapper { margin-top: 22px; }
    .spotify-wrapper iframe { height: 152px; }
    .envelope { width: 190px; height: 125px; }
    .envelope-body::before, .envelope-body::after { border-top: 62px solid #ffd3dd; }
    .envelope-body::before { border-left: 95px solid transparent; }
    .envelope-body::after  { border-right: 95px solid transparent; }
    .envelope-flap { border-left: 95px solid transparent; border-right: 95px solid transparent; border-top: 68px solid #ffb6c8; }
    .seal { top: 50px; width: 30px; height: 30px; }
  }
</style>
</head>
<body>

  <div class="flower-field" id="flowerField"></div>

  <div class="envelope-screen" id="envelopeScreen">
    <div class="envelope">
      <div class="envelope-body"></div>
      <div class="seal"></div>
      <div class="envelope-flap"></div>
    </div>
    <div class="envelope-hint">Toca el sobre para abrirlo</div>
  </div>

  <div class="card" id="letterCard">
    <div class="heart">🤍</div>
    <span class="day-badge" id="dayBadge">Día 1</span>
    <h1 id="songTitle">…</h1>
    <p id="songMood"></p>
    <p id="songExtra"></p>

    <div class="spotify-wrapper" id="spotifyWrapper">
      <iframe id="spotifyIframe"
        style="border-radius:12px"
        src=""
        width="100%"
        height="352"
        frameborder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>

    <div id="noSongMsg" class="no-song" style="display:none;">
      Todavía no hay canción para hoy, volvé más tarde 🤍
    </div>

    <p class="signature" id="sig1"></p>
    <p class="signature" id="sig2"></p>
    <p class="signature" id="sig3"></p>

    <div class="reply-box">
      <h2 id="replyQuestion">¿Qué opinás?</h2>
      <form id="replyForm" action="https://formspree.io/f/xgojwqlo" method="POST">
        <input type="hidden" name="dia" id="hiddenDia" value="" />
        <textarea name="mensaje" placeholder="Escribe lo que sientas..." required></textarea>
        <button type="submit" id="replyButton">Enviar</button>
      </form>
      <p class="reply-thanks" id="replyThanks" style="display:none;">
        Le agradezco si me llega a escribir, tenga por seguro que lo leeré 🤍
      </p>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    //  LISTA DE CANCIONES — solo editá esto cada día
    //  Cómo conseguir el trackId:
    //    Spotify → "..." → Compartir → Copiar enlace
    //    el ID es la parte después de /track/ y antes del "?"
    // ═══════════════════════════════════════════════════════
    const INICIO = "2026-06-20"; // Día 1 — no cambies esto

    const canciones = [
      {
        fecha:   "2026-06-20",
        trackId: "1gtHZr29U6Oil71yXqNO7j",
        titulo:  "Soñé",
        mood:    "El mood de hoy es Soñé, de Zoé.",
        extra:   "A veces hay sentimientos que uno no sabe cómo decir en palabras, y de repente los encontrás en una canción. Esta es una de esas. Espero que la escuche sin apuro.",
        sig1:    "Lo ideal sería que la escuches completa.",
        sig2:    "Es con mucho cariño.",
        sig3:    "La quiero mucho.",
        pregunta: "¿Qué sintió al escucharla?"
      },
      {
        fecha:   "2026-06-21",
        trackId: "5RTYQOyY0xQ1x6F6FcucnZ",
        titulo:  "Piel Canela",
        mood:    "El mood de hoy es Piel Canela, de Cuco.",
        extra:   "Esta canción es corta pero dice mucho. Hay algo en la forma en que suena que me recuerda a usted. Espero que la sienta tan bonita como yo la siento.",
        sig1:    "Lo ideal sería que la escuches completa.",
        sig2:    "-----------------------------------------",
        sig3:    "La aprecio como no tiene idea.",
        pregunta: "¿Cuál es su mood de hoy?"
      },
      {
        fecha:   "2026-06-22",
        trackId: "0fvKgQ0XzWJKEDJSPdNDid",
        titulo:  "Habla tu espejo",
        mood:    "El mood de hoy es Habla tu espejo, de El Cuarteto de Nos.",
        extra:   "Esta canción me hizo pensar mucho en cómo a veces uno se engaña a sí mismo. El espejo no miente, y yo tampoco quiero mentirme más. Me siento muy identificado con varias partes. Espero que le guste.",
        sig1:    "Lo ideal sería que la escuches completa.",
        sig2:    "PD: La siento un poco tensa, espero que pronto podamos solucionar eso y seguir adelante.",
        sig3:    "La aprecio mucho.",
        pregunta: "¿Qué le dijo su espejo hoy?"
      },
      // ── Día 4 en adelante: copiá el bloque de arriba y pegalo acá ──
      // {
      //   fecha:   "2026-06-23",
      //   trackId: "PEGA_EL_ID_DE_SPOTIFY",
      //   titulo:  "Título de la carta",
      //   mood:    "El mood de hoy es ...",
      //   extra:   "Mensaje adicional si querés.",
      //   sig1:    "Firma 1",
      //   sig2:    "Firma 2",
      //   sig3:    "Firma 3",
      //   pregunta: "¿Qué opinás de esta canción?"
      // },
    ];

    // ═══════════════════════════════════════════════════════
    //  NO TOQUES NADA DE ACÁ PARA ABAJO
    // ═══════════════════════════════════════════════════════

    // Modo noche siempre activo
    document.body.classList.add('night');

    // Calcular día actual
    const hoy = new Date().toISOString().slice(0, 10);
    const inicio = new Date(INICIO);
    const ahora  = new Date(hoy);
    const diffDias = Math.floor((ahora - inicio) / 86400000) + 1;
    document.getElementById('dayBadge').textContent = `Día ${diffDias}`;

    // Buscar la canción de hoy
    const cancionHoy = canciones.find(c => c.fecha === hoy);

    if (cancionHoy) {
      document.getElementById('songTitle').textContent   = cancionHoy.titulo;
      document.getElementById('songMood').textContent    = cancionHoy.mood;
      document.getElementById('songExtra').textContent   = cancionHoy.extra || '';
      document.getElementById('sig1').textContent        = cancionHoy.sig1 || '';
      document.getElementById('sig2').textContent        = cancionHoy.sig2 || '';
      document.getElementById('sig3').textContent        = cancionHoy.sig3 || '';
      document.getElementById('replyQuestion').textContent = cancionHoy.pregunta || '¿Qué opinás?';
      document.getElementById('hiddenDia').value         = `Día ${diffDias} — ${hoy}`;
      document.getElementById('spotifyIframe').src =
        `https://open.spotify.com/embed/track/${cancionHoy.trackId}?utm_source=generator&theme=0`;
    } else {
      document.getElementById('spotifyWrapper').style.display = 'none';
      document.getElementById('noSongMsg').style.display = 'block';
      document.getElementById('songTitle').textContent = '🤍';
      document.getElementById('songMood').textContent  = '';
    }

    // Corazones flotantes
    const field  = document.getElementById('flowerField');
    const estilos = ['s1','s2','s3','s4','s5','s6'];
    const total  = window.innerWidth < 500 ? 16 : 24;

    for (let i = 0; i < total; i++) {
      const h = document.createElement('div');
      h.className = 'pixel-heart ' + estilos[Math.floor(Math.random() * estilos.length)];
      h.style.left              = (Math.random() * 100) + 'vw';
      h.style.animationDuration = (8 + Math.random() * 9) + 's';
      h.style.animationDelay    = '-' + (Math.random() * 15) + 's';
      field.appendChild(h);
    }

    // Apertura del sobre
    const envScreen  = document.getElementById('envelopeScreen');
    const letterCard = document.getElementById('letterCard');

    envScreen.addEventListener('click', () => {
      if (envScreen.classList.contains('opening')) return;
      envScreen.classList.add('opening');
      setTimeout(() => {
        envScreen.classList.add('hidden');
        letterCard.classList.add('reveal');

        // ── Notificación silenciosa de apertura ──
        const modo = document.body.classList.contains('night') ? 'Noche 🌙' : 'Día ☀️';
        const hora = new Date().toLocaleTimeString('es-CR');
        fetch('https://formspree.io/f/xgojwqlo', {
          method: 'POST',
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
          body: JSON.stringify({
            _subject: `💌 Abrió la página — Día ${diffDias}`,
            evento:   'apertura',
            dia:      `Día ${diffDias}`,
            hora:     hora,
            modo:     modo,
            mensaje:  `La página fue abierta el Día ${diffDias} a las ${hora} (modo ${modo})`
          })
        }).catch(() => {}); // silencioso, no importa si falla
      }, 1100);
    });

    // Envío del formulario
    const replyForm   = document.getElementById('replyForm');
    const replyButton = document.getElementById('replyButton');
    const replyThanks = document.getElementById('replyThanks');

    replyForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      replyButton.disabled = true;
      replyButton.textContent = 'Enviando...';

      try {
        const res = await fetch(replyForm.action, {
          method:  'POST',
          body:    new FormData(replyForm),
          headers: { 'Accept': 'application/json' }
        });

        if (res.ok) {
          replyForm.style.display   = 'none';
          replyThanks.style.display = 'block';
        } else {
          replyButton.disabled = false;
          replyButton.textContent = 'Enviar';
          alert('Hubo un problema al enviar. Intenta de nuevo.');
        }
      } catch {
        replyButton.disabled = false;
        replyButton.textContent = 'Enviar';
        alert('Hubo un problema al enviar. Intenta de nuevo.');
      }
    });
  </script>
</body>
