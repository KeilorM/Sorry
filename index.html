<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lo siento</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(135deg, #fdf6f0 0%, #f3e7e9 50%, #e3eeff 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    padding: 20px;
    position: relative;
    transition: background 1.5s ease;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body.night {
    background: linear-gradient(135deg, #1b1530 0%, #2a1f4d 50%, #15102b 100%);
    background-size: 400% 400%;
  }

  body.night .card {
    background: rgba(30, 22, 50, 0.78);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 40px rgba(160, 130, 255, 0.15);
  }

  body.night h1 { color: #f0e6ff; }
  body.night p { color: #cfc3e8; }
  body.night .signature { color: #a797cf; }
  body.night .day-badge { background: rgba(255,255,255,0.1); color: #e0d0ff; }

  body.night .pixel-heart {
    opacity: 0.85;
    mix-blend-mode: normal;
    filter: drop-shadow(0 0 4px currentColor);
  }

  body.night .envelope-body { background: linear-gradient(160deg, #4a3970, #322455); }
  body.night .envelope-hint { color: #cfc3e8; }

  body.night .reply-box h2 { color: #f0e6ff; }
  body.night .reply-box textarea,
  body.night .reply-box input[type="text"] {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.2);
    color: #f0e6ff;
  }
  body.night .reply-box textarea::placeholder,
  body.night .reply-box input[type="text"]::placeholder { color: #a797cf; }
  body.night .reply-box { border-top-color: rgba(255,255,255,0.12); }
  body.night .reply-thanks { color: #cfc3e8; }

  body.night .reply-tabs button {
    background: rgba(255,255,255,0.07);
    color: #cfc3e8;
    border-color: rgba(255,255,255,0.15);
  }
  body.night .reply-tabs button.active {
    background: linear-gradient(135deg, #7b5ea7, #5c3d8f);
    color: #fff;
    border-color: transparent;
  }
  body.night .yt-preview {
    background: rgba(0,0,0,0.35);
    border-color: rgba(255,255,255,0.1);
  }
  body.night .yt-search-hint { color: #a797cf; }
  body.night .yt-result-item {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.1);
    color: #f0e6ff;
  }
  body.night .yt-result-item:hover { background: rgba(255,255,255,0.13); }
  body.night .yt-results-list { border-color: rgba(255,255,255,0.1); }
  body.night .search-field-wrap input { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); color: #f0e6ff; }
  body.night .search-field-wrap input::placeholder { color: #a797cf; }
  body.night .search-btn { background: rgba(255,255,255,0.1); color: #e0d0ff; }
  body.night .search-btn:hover { background: rgba(255,255,255,0.18); }

  /* ---------- Corazones ---------- */
  .flower-field {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 5;
  }

  .pixel-heart {
    position: absolute;
    bottom: -40px;
    image-rendering: pixelated;
    animation-name: floatUp;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    opacity: 0.65;
    mix-blend-mode: multiply;
  }

  .pixel-heart::before {
    content: "";
    display: block;
    width: 4px;
    height: 4px;
    background: transparent;
    box-shadow:
      4px 0px 0 0 var(--c),  8px 0px 0 0 var(--c),
      16px 0px 0 0 var(--c), 20px 0px 0 0 var(--c),
      0px 4px 0 0 var(--c),  4px 4px 0 0 var(--c),  8px 4px 0 0 var(--c), 12px 4px 0 0 var(--c), 16px 4px 0 0 var(--c), 20px 4px 0 0 var(--c), 24px 4px 0 0 var(--c),
      0px 8px 0 0 var(--c),  4px 8px 0 0 var(--c),  8px 8px 0 0 var(--c), 12px 8px 0 0 var(--c), 16px 8px 0 0 var(--c), 20px 8px 0 0 var(--c), 24px 8px 0 0 var(--c),
      4px 12px 0 0 var(--c), 8px 12px 0 0 var(--c), 12px 12px 0 0 var(--c), 16px 12px 0 0 var(--c), 20px 12px 0 0 var(--c),
      8px 16px 0 0 var(--c), 12px 16px 0 0 var(--c), 16px 16px 0 0 var(--c),
      12px 20px 0 0 var(--c);
  }

  .pixel-heart.s1 { --c: #ff4d6d; transform: scale(0.8); }
  .pixel-heart.s2 { --c: #ffb6d9; transform: scale(1); }
  .pixel-heart.s3 { --c: #c9a7ff; transform: scale(0.7); }
  .pixel-heart.s4 { --c: #ffd166; transform: scale(0.9); }
  .pixel-heart.s5 { --c: #6fc3ff; transform: scale(1.1); }
  .pixel-heart.s6 { --c: #ff8fa3; transform: scale(0.65); }

  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    8% { opacity: 0.65; }
    50% { transform: translateY(-50vh) translateX(20px) rotate(15deg); }
    92% { opacity: 0.65; }
    100% { transform: translateY(-105vh) translateX(-10px) rotate(-15deg); opacity: 0; }
  }

  /* ---------- Badge día ---------- */
  .day-badge {
    display: inline-block;
    background: rgba(255, 111, 145, 0.12);
    color: #c0506a;
    border-radius: 999px;
    padding: 4px 16px;
    font-size: 0.82rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-style: normal;
    font-family: 'Georgia', serif;
    transition: background 1.5s ease, color 1.5s ease;
  }

  /* ---------- Sobre ---------- */
  .envelope-screen {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .envelope {
    position: relative;
    width: 300px;
    height: 196px;
    animation: envFloat 4s ease-in-out infinite;
    perspective: 600px;
  }

  @keyframes envFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%       { transform: translateY(-12px) rotate(1deg); }
  }

  /* Sombra externa que oscila */
  .envelope-shadow {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 18px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.28) 0%, transparent 70%);
    animation: shadowPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes shadowPulse {
    0%, 100% { transform: translateX(-50%) scaleX(1);   opacity: 0.7; }
    50%       { transform: translateX(-50%) scaleX(0.8); opacity: 0.35; }
  }

  /* Cuerpo principal */
  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #3d1f5c 0%, #2a1245 60%, #1e0d38 100%);
    border-radius: 12px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.06) inset,
      0 -2px 0 rgba(0,0,0,0.3) inset,
      0 24px 48px rgba(0,0,0,0.55),
      0 4px 12px rgba(160,100,255,0.15);
    overflow: hidden;
  }

  /* Líneas decorativas sutiles en el cuerpo */
  .envelope-body::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,0.025) 18px,
        rgba(255,255,255,0.025) 19px
      );
    border-radius: 12px;
  }

  /* Triángulos laterales inferiores (V del fondo) */
  .envelope-bottom-left,
  .envelope-bottom-right {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
    z-index: 1;
  }
  .envelope-bottom-left {
    left: 0;
    border-bottom: 98px solid #4a2870;
    border-right: 150px solid transparent;
  }
  .envelope-bottom-right {
    right: 0;
    border-bottom: 98px solid #4a2870;
    border-left: 150px solid transparent;
  }

  /* Solapa superior (flap) */
  .envelope-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0;
    width: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-top: 108px solid #5c3490;
    transform-origin: top center;
    transition: transform 0.75s cubic-bezier(.6,-0.3,.74,.05);
    z-index: 4;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
  }

  /* Borde iluminado en la solapa */
  .envelope-flap::before {
    content: "";
    position: absolute;
    top: -108px;
    left: -150px;
    width: 0; height: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-top: 4px solid rgba(200,150,255,0.25);
  }

  /* Sello de lacre */
  .seal {
    position: absolute;
    top: 72px;
    left: 50%;
    transform: translate(-50%, 0);
    z-index: 5;
    transition: opacity 0.4s ease, transform 0.45s cubic-bezier(.4,0,.2,1);
    width: 48px;
    height: 48px;
  }

  .seal-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #c084fc, #7c3aed 55%, #4c1d95);
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.15),
      0 0 16px rgba(167,139,250,0.6),
      inset 0 1px 2px rgba(255,255,255,0.25),
      inset 0 -1px 2px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: sealGlow 2.5s ease-in-out infinite;
  }

  @keyframes sealGlow {
    0%, 100% { box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 0 16px rgba(167,139,250,0.6), inset 0 1px 2px rgba(255,255,255,0.25), inset 0 -1px 2px rgba(0,0,0,0.35); }
    50%       { box-shadow: 0 0 0 2px rgba(255,255,255,0.22), 0 0 28px rgba(167,139,250,0.9), inset 0 1px 2px rgba(255,255,255,0.3),  inset 0 -1px 2px rgba(0,0,0,0.35); }
  }

  .seal-heart {
    font-size: 20px;
    line-height: 1;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }

  /* Bordes del sobre (línea del pliegue central) */
  .envelope-crease {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 1px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 60%, transparent 100%);
    z-index: 2;
  }

  /* Texto hint */
  .envelope-hint {
    margin-top: 28px;
    font-size: 0.9rem;
    color: #b8a0d8;
    font-style: italic;
    letter-spacing: 0.3px;
    animation: hintPulse 2s ease-in-out infinite;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1; }
  }

  /* Estrellas decorativas alrededor del sobre */
  .env-star {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(200,160,255,0.7);
    animation: twinkle var(--d, 2s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1.3); }
  }

  /* Estados de apertura */
  .envelope-screen.opening .envelope-flap  { transform: rotateX(180deg); }
  .envelope-screen.opening .seal           { opacity: 0; transform: translate(-50%, -14px) scale(0.5); }
  .envelope-screen.opening .envelope       { animation: none; }
  .envelope-screen.opening .envelope-body  { animation: envShrink 0.65s ease 0.55s forwards; }
  .envelope-screen.opening .envelope-shadow { animation: none; opacity: 0; }
  .envelope-screen.opening .envelope-hint  { opacity: 0; transition: opacity 0.3s; }

  @keyframes envShrink {
    to { transform: translateY(50px) scale(0.82); opacity: 0; }
  }

  .envelope-screen.hidden { display: none; }

  /* Responsive sobre */
  @media (max-width: 600px) {
    .envelope { width: 260px; height: 170px; }
    .envelope-flap { border-left-width: 130px; border-right-width: 130px; border-top-width: 94px; }
    .envelope-bottom-left  { border-bottom-width: 85px; border-right-width: 130px; }
    .envelope-bottom-right { border-bottom-width: 85px; border-left-width:  130px; }
    .seal { top: 62px; }
  }
  @media (max-width: 380px) {
    .envelope { width: 220px; height: 144px; }
    .envelope-flap { border-left-width: 110px; border-right-width: 110px; border-top-width: 80px; }
    .envelope-bottom-left  { border-bottom-width: 72px; border-right-width: 110px; }
    .envelope-bottom-right { border-bottom-width: 72px; border-left-width:  110px; }
    .seal { top: 52px; width: 40px; height: 40px; }
    .seal-circle { width: 40px; height: 40px; }
    .seal-heart { font-size: 16px; }
  }

  /* ---------- Carta ---------- */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    max-width: 520px;
    width: 100%;
    padding: 48px 40px;
    text-align: center;
    transition: background 1.5s ease, box-shadow 1.5s ease;
    display: none;
    opacity: 0;
  }

  .card.reveal {
    display: block;
    animation: letterRise 0.9s cubic-bezier(.2,.8,.2,1) forwards;
  }

  @keyframes letterRise {
    from { opacity: 0; transform: translateY(60px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .heart {
    font-size: 2.5rem;
    margin-bottom: 10px;
    animation: pulse 2s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  h1 {
    font-size: 1.9rem;
    color: #4a3b3b;
    margin: 0 0 18px;
    font-weight: 400;
    letter-spacing: 0.5px;
    transition: color 1.5s ease;
  }

  p {
    color: #6b5a5a;
    line-height: 1.7;
    font-size: 1.05rem;
    margin: 0 0 16px;
    transition: color 1.5s ease;
  }

  .signature {
    margin-top: 16px;
    font-style: italic;
    color: #9a8a8a;
    font-size: 0.95rem;
    transition: color 1.5s ease;
  }

  .spotify-wrapper {
    margin-top: 32px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    width: 100%;
  }

  .spotify-wrapper iframe {
    display: block;
    width: 100%;
    border-radius: 12px;
  }

  /* ---------- Reply box ---------- */
  .reply-box {
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid rgba(0,0,0,0.08);
    text-align: left;
  }

  .reply-box h2 {
    font-size: 1.1rem;
    font-weight: 400;
    color: #4a3b3b;
    margin: 0 0 16px;
    text-align: center;
    font-style: italic;
  }

  /* ---------- Tabs ---------- */
  .reply-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }

  .reply-tabs button {
    flex: 1;
    padding: 9px 12px;
    border-radius: 999px;
    border: 1.5px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.5);
    color: #6b5a5a;
    font-family: inherit;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .reply-tabs button.active {
    background: linear-gradient(135deg, #ff8fa3, #ff6f91);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 14px rgba(255,111,145,0.35);
  }

  /* ---------- Panel texto ---------- */
  .reply-panel { display: none; }
  .reply-panel.active { display: block; }

  .reply-box textarea,
  .reply-box input[type="text"] {
    width: 100%;
    border-radius: 12px;
    border: 1.5px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.6);
    padding: 12px 14px;
    font-family: inherit;
    font-size: 0.95rem;
    color: #4a3b3b;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s ease;
  }

  .reply-box textarea { min-height: 100px; }

  .reply-box textarea:focus,
  .reply-box input[type="text"]:focus { border-color: #ff8fa3; }

  .reply-box button.send-btn {
    display: block;
    margin: 14px auto 0;
    padding: 10px 28px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff8fa3, #ff6f91);
    color: white;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(255,111,145,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .reply-box button.send-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,111,145,0.45); }
  .reply-box button.send-btn:disabled { opacity: 0.6; cursor: default; transform: none; }

  /* ---------- Panel canción ---------- */
  .search-field-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .search-field-wrap input {
    flex: 1;
    min-width: 0;
    resize: none;
  }

  .search-btn {
    padding: 0 16px;
    border-radius: 12px;
    border: 1.5px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.6);
    color: #6b5a5a;
    font-family: inherit;
    font-size: 0.88rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s ease;
    flex-shrink: 0;
  }

  .search-btn:hover { background: rgba(255,255,255,0.9); }
  .search-btn:disabled { opacity: 0.5; cursor: default; }

  .yt-search-hint {
    font-size: 0.82rem;
    color: #9a8a8a;
    font-style: italic;
    margin-bottom: 10px;
    text-align: center;
  }

  /* Results list */
  .yt-results-list {
    border-radius: 12px;
    border: 1.5px solid rgba(0,0,0,0.08);
    overflow: hidden;
    margin-bottom: 14px;
    display: none;
  }

  .yt-result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.5);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: background 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .yt-result-item:last-child { border-bottom: none; }
  .yt-result-item:hover { background: rgba(255,111,145,0.08); }
  .yt-result-item:active { background: rgba(255,111,145,0.15); }

  .yt-result-item img {
    width: 60px;
    height: 45px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .yt-result-info { flex: 1; min-width: 0; }
  .yt-result-title {
    font-size: 0.88rem;
    color: #4a3b3b;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  body.night .yt-result-title { color: #f0e6ff; }
  .yt-result-channel {
    font-size: 0.78rem;
    color: #9a8a8a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .yt-result-pick {
    font-size: 1.2rem;
    flex-shrink: 0;
    opacity: 0.5;
  }

  /* Preview embed */
  .yt-preview {
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    border: 2px solid rgba(255,111,145,0.3);
    margin-bottom: 12px;
    display: none;
    position: relative;
  }

  .yt-preview iframe {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
  }

  .yt-preview-label {
    font-size: 0.8rem;
    color: #9a8a8a;
    font-style: italic;
    text-align: center;
    margin-bottom: 8px;
    display: none;
  }

  .yt-change-btn {
    display: none;
    margin: 0 auto 12px;
    padding: 6px 18px;
    border-radius: 999px;
    border: 1.5px solid rgba(255,111,145,0.4);
    background: transparent;
    color: #ff8fa3;
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .yt-change-btn:hover { background: rgba(255,111,145,0.1); }

  .reply-song-note {
    width: 100%;
    min-height: 60px;
    resize: vertical;
    margin-top: 8px;
  }

  .reply-thanks {
    text-align: center;
    font-style: italic;
    color: #8a6f6f;
    margin-top: 14px;
  }

  /* ---------- Sin canción hoy ---------- */
  .no-song {
    color: #9a8a8a;
    font-style: italic;
    margin-top: 24px;
    font-size: 0.95rem;
  }

  /* ---------- Responsive ---------- */

    async function searchYT() {
      const query = document.getElementById('ytSearchInput').value.trim();
      if (!query) return;

      const btn = document.getElementById('ytSearchBtn');
      btn.disabled = true;
      btn.textContent = '…';

      const resultsList = document.getElementById('ytResultsList');
      resultsList.innerHTML = '<div style="padding:12px;text-align:center;font-style:italic;font-size:0.85rem;color:#9a8a8a;">Buscando…</div>';
      resultsList.style.display = 'block';

      try {
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=${encodeURIComponent(query)}&key=${YT_KEY}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('api error');
        const data = await res.json();
        const items = data.items || [];

        if (!items.length) {
          resultsList.innerHTML = '<div style="padding:12px;text-align:center;font-style:italic;font-size:0.85rem;color:#9a8a8a;">No se encontraron resultados.</div>';
          btn.disabled = false;
          btn.textContent = 'Buscar';
          return;
        }

        resultsList.innerHTML = '';
        items.forEach(item => {
          const videoId = item.id.videoId;
          const title   = item.snippet.title;
          const channel = item.snippet.channelTitle;
          const thumb   = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '';

          const el = document.createElement('div');
          el.className = 'yt-result-item';
          el.innerHTML = `
            <img src="${escHtml(thumb)}" alt="" onerror="this.style.display='none'"/>
            <div class="yt-result-info">

          resultsList.appendChild(el);
        });

        resultsList.innerHTML = '<div style="padding:12px;text-align:center;font-style:italic;font-size:0.85rem;color:#9a8a8a;">Hubo un error al buscar. Intentá de nuevo.</div>';
      }

      btn.disabled = false;
      btn.textContent = 'Buscar';
    }

    function extractYtId(url) {
      const m = url.match(/(?:v=|youtu\.be\/|\/embed\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function pickVideo(videoId, title) {
      selectedVideoId    = videoId;
      selectedVideoTitle = title;

      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
